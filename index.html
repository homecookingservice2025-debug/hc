<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HC Home Cooking</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.body.insertAdjacentHTML('beforeend', 
          '<div style="position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:10px;z-index:9999;font-family:sans-serif">' +
          '<b>Runtime Error:</b> ' + msg + ' (at ' + url + ':' + lineNo + ')' +
          '</div>'
        );
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
